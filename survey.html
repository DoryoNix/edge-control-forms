ding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}.dl-btn.green{background:#d1fae5;color:var(--green)}.rep-frame{flex:1;border:none;width:100%;min-height:calc(100vh - 60px)}

}
const isApt = a => a.connection_type === 'חיבור לארון חשמל דירתי';

/* ============================================================

function buildQuestions(){questions=[];
q('reviewer_name','שם מלא של הסוקר','text',{required:true});q('review_date','תאריך הסקירה','date',{required:true});q('company_name','שם החברה (שיוך ההתקנה)','text',{skippable:true});q('site_name','שם מתחם (שיוך למתחם מנוהל)','text',{skippable:true});

q('contact_name','שם מלא של איש הקשר','text',{required:true});q('contact_phone','נייד של הלקוח','tel',{required:true});q('contact_email','מייל','email',{skippable:true});
q('has_wifi','האם קיים אינטרנט אלחוטי בחניית הלקוח?','choice',{options:['כן','לא','דלג']});q('wifi_name','שם הרשת','text',{skippable:true,cond:a=>a.has_wifi==='כן'});q('wifi_pass','סיסמא לרשת','text',{skippable:true,cond:a=>a.has_wifi==='כן'});
q('needs_management','האם נדרש לחבר את העמדה למערכת הניהול?','yesno');q('app_type','חיבור עמדת הטעינה לאפליקציה','choice',{options:['Edge Control','Wevo','אפליקציה מובנית של עמדת הטעינה','הגדרת טעינה אוטומטית','דלג']});
q('connection_type','שיטת חיבור עמדת הטעינה להזנת החשמל','choice',{options:['חיבור לארון חשמל דירתי','חיבור לארון חשמל ציבורי בבניין','חיבור דרך פיצול מונה חברת חשמל']});
q('apt_panel_location','מיקום לוח החשמל הדירתי','text',{cond:isApt});q('apt_panel_photo','תמונה של לוח החשמל הדירתי','image',{skippable:true,cond:isApt});q('apt_phase_type','סוג המפסק הראשי','choice',{options:['חד פאזי','תלת פאזי'],cond:isApt});q('apt_breaker_size','גודל המפסק הראשי','choice',{options:['16A','25A','40A','50A','63A'],cond:a=>isApt(a)&&a.apt_phase_type==='חד פאזי'});q('apt_breaker_size_3','גודל המפסק הראשי','choice',{options:['3×16A','3×25A','3×32A','3×40A','3×50A','3×63A','3×80A','אחר'],cond:a=>isApt(a)&&a.apt_phase_type==='תלת פאזי'});q('apt_breaker_size_other','פירוט גודל מפסק','text',{cond:a=>isApt(a)&&a.apt_breaker_size_3==='אחר'});q('apt_free_current','זרם פנוי שנמדד [A]','number',{skippable:true,cond:isApt});q('apt_breaker_space','יש מקום להוספת מפסק?','yesno',{cond:isApt});q('apt_rcbo_space','יש מקום לפחת?','yesno',{cond:isApt});q('apt_notes','הערות לחיבור מפסקי ההזנה (ארון דירתי)','textarea',{skippable:true,cond:isApt});
q('pub_panel_location','מיקום לוח החשמל הציבורי','text',{cond:isPub});q('pub_panel_photo','תמונה של לוח החשמל הציבורי','image',{skippable:true,cond:isPub});q('pub_busbar_photo','תמונה של פסי צבירה / מקור הזנת החשמל למפסק עמדת הטעינה','image',{skippable:true,cond:isPub});q('pub_breaker_size','גודל המפסק הראשי','choice',{options:['3×16A','3×25A','3×32A','3×40A','3×50A','3×63A','3×80A','אחר'],cond:isPub});q('pub_breaker_size_other','פירוט גודל מפסק','text',{cond:a=>isPub(a)&&a.pub_breaker_size==='אחר'});q('pub_free_current','זרם פנוי שנמדד [A]','number',{skippable:true,cond:isPub});q('pub_breaker_space','יש מקום להוספת מפסק?','yesno',{cond:isPub});q('pub_breaker_location','היכן ניתן להתקין את מפסק ההזנה?','text',{cond:a=>isPub(a)&&a.pub_breaker_space==='לא'});q('pub_rcbo_space','יש מקום לפחת?','yesno',{cond:isPub});q('pub_rcbo_location','היכן ניתן להתקין את הפחת?','text',{cond:a=>isPub(a)&&a.pub_rcbo_space==='לא'});q('pub_busbar','האם נדרש לחבר לפסי צבירה?','choice',{options:['כן','לא','אחר'],cond:isPub});q('pub_busbar_other','פירוט – פסי צבירה','text',{cond:a=>isPub(a)&&a.pub_busbar==='אחר'});q('pub_notes','הערות לחיבור מפסקי ההזנה (ארון ציבורי)','textarea',{skippable:true,cond:isPub});
q('building_type','סוג המבנה','choice',{options:['בניין מגורים','בית פרטי'],cond:isSplit});q('pillar_type','סוג הפילר','choice',{options:['ריכוז מונים','מונה נפרד','מונה קומתי (מונה בלובי של קומת הדירה)'],cond:isSplit});q('meter_location','מיקום המונה','textarea',{skippable:true,cond:isSplit});q('meter_photo','תמונה של מיקום המונה','image',{skippable:true,cond:isSplit});q('split_phase_type','סוג המפסק הראשי בדירה','choice',{options:['חד פאזי (לא ניתן לפיצול)','תלת פאזי'],cond:isSplit});q('split_breaker_size','גודל המפסק הראשי','choice',{options:['3×16A','3×25A','3×32A','3×40A','3×50A','3×63A','3×80A','אחר'],cond:a=>isSplit(a)&&a.split_phase_type==='תלת פאזי'});q('split_breaker_other','פירוט גודל מפסק','text',{cond:a=>isSplit(a)&&a.split_breaker_size==='אחר'});q('split_cable','שטח חתך של הכבל המזין את הדירה','choice',{options:['5×10','5×16'],cond:a=>isSplit(a)&&a.split_phase_type==='תלת פאזי'});q('split_panel_space','האם יש מקום ללוח פיצול בצמוד למונה החשמל?','choice',{options:['כן','לא','אחר'],cond:a=>isSplit(a)&&a.split_phase_type==='תלת פאזי'});q('split_panel_space_other','פירוט – מיקום לוח פיצול','text',{cond:a=>isSplit(a)&&a.split_panel_space==='אחר'});q('split_panel_photo','תמונה של מיקום התקנת לוח הפיצול','image',{skippable:true,cond:a=>isSplit(a)&&a.split_phase_type==='תלת פאזי'});q('split_panel_size','גודל לוח הפיצול הנדרש','choice',{options:['4 מודול','8 מודול','12 מודול','16 מודול','אחר'],cond:a=>isSplit(a)&&a.split_phase_type==='תלת פאזי'});q('split_panel_size_other','פירוט גודל לוח','text',{cond:a=>isSplit(a)&&a.split_panel_size==='אחר'});q('split_grounding','האם קיימת הארקה בצמוד להתקנת לוח הפיצול?','yesno',{cond:a=>isSplit(a)&&a.split_phase_type==='תלת פאזי'});q('split_grounding_photo','תמונה של חיבור ההארקה','image',{skippable:true,cond:a=>isSplit(a)&&a.split_grounding==='כן'});q('meter_room_key','האם יש צורך במפתח לחדר מונים?','yesno',{cond:a=>isSplit(a)&&a.split_phase_type==='תלת פאזי'});q('meter_key_holder','מי מחזיק במפתח?','text',{cond:a=>isSplit function showScreen(id){['home','chat-screen','report-screen'].forEach(s=>document.getElementById(s).style.display='none');document.getElementById(id).style.display='flex'}
function goHome(){A={};images={};qIdx=0;questions=[];document.getElementById('messages').innerHTML='';showScreen('home')}
function startSurvey(){A={};images={};qIdx=0;multiSel=[];buildQuestions();document.getElementById('messages').innerHTML='';showScreen('chat-screen');addBot('שלום! נתחיל את סיור השטח. אענה על השאלות שלב אחר שלב. 🔌');setTimeout(askCurrent,500)}
function getVisible(){return questions.filter(q=>!q.cond||q.cond(A))}function updateProg(){const vis=getVisible(),pct=vis.length?Math.round((qIdx/vis.length)*100):0;document.getElementById('prog-text').textContent=`${qIdx}/${vis.length}`;document.getElementById('prog-fill').style.width=pct+'%'}
function askCurrent(){const vis=getVisible();updateProg();if(qIdx>=vis.length)return finishChat();const q=vis[qIdx];if(q.id==='split_breaker_size'&&A.split_phase_type==='חד פאזי (לא ניתן לפיצול)'){addBot('⚠️ פיצול מונה אינו אפשרי בחיבור חד פאזי. נא לבחור שיטת חיבור אחרת.',null,'alert');A[q.id]='לא רלוונטי – חד פאזי';qIdx++;setTimeout(askCurrent,500);return}if(q.alert)addBot('🔔 '+q.alert,null,'alert');addBot(q.label,q)}
function addBot(text,question,cls='bot'){const div=document.createElement('div');div.className='bubble '+cls;div.innerHTML=(cls==='bot'?'<span style="font-size:15px;margin-left:6px">🤖</span>':'')+`<span>${escapeHTML(text)}</span>`;document.getElementById('messages').appendChild(div);if(question){try{renderInput(question)}catch(err){console.error('renderInput failed:',err);renderBasicInput(question)}}scrollBot()}
function addUser(text){const div=document.createElement('div');div.className='bubble user';div.textContent=text;document.getElementById('messages').appendChild(div);scrollBot()}function scrollBot(){const m=document.getElementById('messages');setTimeout(()=>m.scrollTop=m.scrollHeight,80)}function clearInput(){document.getElementById('input-area').innerHTML=''}

/* ============================================================
   INPUT RENDERING
   ============================================================ */
function renderBasicInput(q){
  const area=document.getElementById('input-area');
  if(!area) return;
  const title=escapeHTML(q.label||'שאלה');
  if(q.type==='yesno'){
    area.innerHTML=`<div class="question-card">${title}<div class="question-hint">בחר כן או לא</div></div><div class="btn-row"><button class="choice-btn" onclick="submit('כן','כן')">✅ כן</button><button class="choice-btn" onclick="submit('לא','לא')">❌ לא</button></div>`;
    return;
  }
  if(q.type==='choice' && Array.isArray(q.options)){
    window._currentChoices=q.options;
    area.innerHTML=`<div class="question-card">${title}<div class="question-hint">בחר אפשרות אחת</div></div><div class="btn-col">${q.options.map((o,i)=>`<button class="${o==='דלג'?'choice-btn skip':'choice-btn'}" onclick="submitByIndex(${i})">${escapeHTML(o)}</button>`).join('')}</div>`;
    return;
  }
  area.innerHTML=`<div class="question-card">${title}<div class="question-hint">הקלד תשובה ולחץ שלח</div></div><div class="text-row"><input class="txt" id="main-inp" type="${q.type==='number'?'number':(q.type==='date'?'date':'text')}" placeholder="הקלד תשובה..." onkeydown="if(event.key==='Enter')submitText()"><button class="send-btn" onclick="submitText()">שלח</button></div>${q.skippable?'<button class="choice-btn skip" onclick="submit(\'דלג\',\'דלג\')" style="margin-top:6px">דלג</button>':''}`;
  setTimeout(()=>document.getElementById('main-inp')?.focus(),100);
}

function questionBanner(q){
  const hint = q.type==='choice' ? 'בחר אפשרות אחת מהרשימה' :
               q.type==='yesno' ? 'בחר כן או לא' :
               q.type==='multi' ? 'אפשר לבחור כמה אפשרויות ולאחר מכן ללחוץ אישור' :
               q.type==='breaker_table' ? 'בחר כמה סוגי מפסקים והכנס כמות לכל סוג' :
               q.type==='table' ? 'הוסף את הפריטים הנדרשים ולאחר מכן לחץ אישור' :
               q.type==='work_table' ? 'הכנס כמויות רק לעבודות הנדרשות' :
               q.type==='image' ? 'צלם או העלה תמונה ולאחר מכן לחץ המשך' :
               'הקלד תשובה ולחץ שלח';
  return `<div class="question-card">${escapeHTML(q.label)}<div class="question-hint">${hint}</div></div>`;
}

function editControls(){
  const answered=getVisible().slice(0,qIdx).filter(qq=>A[qq.id]!==undefined);
  if(!answered.length) return '';
  return `<button class="edit-btn" onclick="showEditList()">✏️ ערוך תשובה קודמת</button>`;
}
function showEditList(){
  const area=document.getElementById('input-area');
  const answered=getVisible().slice(0,qIdx).filter(qq=>A[qq.id]!==undefined);
  area.innerHTML=`<div class="question-card">בחירת שאלה לעריכה<div class="question-hint">בחר סעיף שכבר מולא</div></div><div class="edit-list">${answered.map(qq=>`<button class="edit-item" onclick="editQuestion('${qq.id}')">${escapeHTML(qq.label)}<span>${escapeHTML(formatAnswerPreview(A[qq.id]))}</span></button>`).join('')}</div><button class="multi-confirm" onclick="askCurrent()" style="width:100%;margin-top:10px">חזרה להמשך מילוי</button>`;
}
function formatAnswerPreview(val){
  if(Array.isArray(val)) return val.join(', ');
  if(val && typeof val==='object') return JSON.stringify(val);
  return val || '—';
}
function editQuestion(id){
  const vis=getVisible();
  const idx=vis.findIndex(qq=>qq.id===id);
  if(idx<0) return;
  editingReturnIdx=qIdx;
  qIdx=idx;
  renderInput(vis[idx]);
}
function afterSubmitNext(){
  if(editingReturnIdx!==null){
    const ret=editingReturnIdx;
    editingReturnIdx=null;
    qIdx=ret;
  }else{
    qIdx++;
  }
  setTimeout(()=>askCurrent(),350);
}

function renderInput(q){
  clearInput();
  const area=document.getElementById('input-area');
  const banner=questionBanner(q)+editControls();
  if(q.type==='yesno'){
    area.innerHTML=banner+`<div class="btn-row"><button class="choice-btn" onclick="submit('כן','כן')">✅ כן</button><button class="choice-btn" onclick="submit('לא','לא')">❌ לא</button></div>`;
  }else if(q.type==='choice'){
    window._currentChoices=q.options;
    area.innerHTML=banner+`<div class="btn-col">${q.options.map((o,i)=>`<button class="${o==='דלג'?'choice-btn skip':'choice-btn'}" onclick="submitByIndex(${i})">${escapeHTML(o)}</button>`).join('')}</div>`;
  }else if(q.type==='multi'){
    area.innerHTML=banner+`<div class="btn-col" id="multi-wrap">${q.options.map(o=>`<button class="multi-btn" data-val="${escapeAttr(o)}" onclick="toggleM(this)">${escapeHTML(o)}</button>`).join('')}</div><button class="multi-confirm" onclick="submitMulti()">אישור ←</button>`;
  }else if(q.type==='image'){
    const qid=q.id;
    area.innerHTML=banner+`<div class="img-upload"><label class="img-label" for="img-inp-${qid}">📷 לחץ לצילום / העלאת תמונה</label><input type="file" id="img-inp-${qid}" accept="image/*" ${q.multi?'multiple':''} style="display:none" onchange="handleImg(this,'${qid}')"><div class="img-preview" id="img-prev-${qid}"></div></div><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><button class="multi-confirm" onclick="submitImgDone('${qid}')">✅ המשך</button>${q.skippable?'<button class="choice-btn skip" onclick="submit(\'דלג\',\'דלג\')">דלג (ללא תמונה)</button>':''}</div>`;
  }else if(q.type==='textarea'){
    area.innerHTML=banner+`<div class="text-row"><textarea class="txt" id="main-inp" placeholder="${q.placeholder||'הקלד...'}"></textarea><button class="send-btn" onclick="submitText()">שלח</button></div>${q.skippable?'<button class="choice-btn skip" onclick="submit(\'דלג\',\'דלג\')" style="margin-top:6px">דלג</button>':''}`;
    setTimeout(()=>document.getElementById('main-inp')?.focus(),100);
  }else if(q.type==='breaker_table'){
    renderBreakerTable(area,q);
  }else if(q.type==='table'){
    renderTableInput(area,q);
  }else if(q.type==='work_table'){
    renderWorkTable(area,q);
  }else{
    const t=q.type==='number'?'number':(q.type==='date'?'date':(q.type==='time'?'time':'text'));
    area.innerHTML=banner+`<div class="text-row"><input class="txt" id="main-inp" type="${t}" placeholder="${q.placeholder||'הקלד תשובה...'}" onkeydown="if(event.key==='Enter')submitText()"><button class="send-btn" onclick="submitText()">שלח</button></div>${q.skippable?'<button class="choice-btn skip" onclick="submit(\'דלג\',\'דלג\')" style="margin-top:6px">דלג</button>':''}`;
    setTimeout(()=>document.getElementById('main-inp')?.focus(),100);
  }
}

function toggleM(btn){const v=btn.dataset.val;if(multiSel.includes(v)){multiSel=multiSel.filter(x=>x!==v);btn.classList.remove('selected')}else{multiSel.push(v);btn.classList.add('selected')}}function submitMulti(){const q=getVisible()[qIdx];A[q.id]=multiSel.length?[...multiSel]:[];addUser(multiSel.length?multiSel.join(', '):'—');multiSel=[];clearInput();afterSubmitNext()}function submitText(){const inp=document.getElementById('main-inp');if(!inp)return;submit(inp.value.trim()||'—',inp.value.trim()||'—')}function submit(value,display){const q=getVisible()[qIdx];if(!q)return;A[q.id]=value;addUser(display);clearInput();afterSubmitNext()}function submitByIndex(i){const o=window._currentChoices[i];submit(o,o)}
function handleImg(input,key){if(!images[key])images[key]=[];Array.from(input.files).forEach(file=>{const r=new FileReader();r.onload=e=>{images[key].push(e.target.result);const prev=document.getElementById('img-prev-'+key);if(prev){const img=document.createElement('img');img.className='img-thumb';img.src=e.target.result;prev.appendChild(img)}};r.readAsDataURL(file)})}function submitImgDone(key){const count=images[key]?images[key].length:0;submit(count>0?`${count} תמונות`:'ללא תמונות',count>0?`📷 ${count} תמונות`:'ללא תמונות')}

function renderBreakerTable(area,q){
  area.innerHTML=questionBanner(q)+editControls()+`<p style="font-size:12px;color:#555;margin-bottom:8px">בחר את סוגי המפסקים הנדרשים והכנס כמות לכל סוג. אפשר לבחור כמה סוגים במקביל.</p><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="background:#eef2ff"><th style="padding:7px;border:1px solid #ddd;text-align:right">בחר</th><th style="padding:7px;border:1px solid #ddd;text-align:right">סוג מפסק</th><th style="padding:7px;border:1px solid #ddd;width:90px">כמות</th></tr>${q.options.map((o,i)=>`<tr><td style="border:1px solid #ddd;padding:6px;text-align:center"><input type="checkbox" class="br-check" data-i="${i}" data-name="${escapeAttr(o)}" onchange="toggleBreakerQty(this)"></td><td style="border:1px solid #ddd;padding:6px">${escapeHTML(o)}</td><td style="border:1px solid #ddd;padding:4px"><input type="number" min="1" class="br-qty" data-i="${i}" style="width:70px;border:1px solid #ddd;border-radius:4px;padding:5px;font-family:'Heebo',sans-serif" placeholder="0" disabled></td></tr>`).join('')}</table></div><button class="multi-confirm" onclick="submitBreakerTable()" style="margin-top:8px">אישור ←</button>`;
}
function toggleBreakerQty(cb){
  const qty=document.querySelector(`.br-qty[data-i="${cb.dataset.i}"]`);
  if(!qty)return;
  qty.disabled=!cb.checked;
  if(cb.checked && (!qty.value || parseInt(qty.value)<=0)) qty.value=1;

  }

}

function initSignatureCanvas(){
  const canvas = document.getElementById('signature-canvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;

  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#111';

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: (touch.clientX - rect.left) * (canvas.width / rect.width),
      y: (touch.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  function start(e){
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }

  function move(e){
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }

  function end(e){
    e.preventDefault();
    drawing = false;
  }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);

  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end, {passive:false});
}

function clearSignature(){
  const canvas = document.getElementById('signature-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function section(title,content){return `<div class="section-title">${escapeHTML(title)}</div><div class="grid">${content}</div>`}function connectionSection(conn,isA,isP,isS){let c='';if(isA)c=fld('מיקום לוח חשמל',v('apt_panel_location'))+fld('סוג מפסק ראשי',v('apt_phase_type'))+fld('גודל מפסק ראשי',A.apt_breaker_size==='—'?v('apt_breaker_size_3'):v('apt_breaker_size'))+fld('זרם פנוי [A]',v('apt_free_current'))+fld('מקום למפסק',v('apt_breaker_space'))+fld('מקום לפחת',v('apt_rcbo_space'))+fldF('הערות',v('apt_notes'));if(isP)c=fld('מיקום לוח ציבורי',v('pub_panel_location'))+fld('גודל מפסק ראשי',v('pub_breaker_size'))+fld('זרם פנוי [A]',v('pub_free_current'))+fld('מקום למפסק',v('pub_breaker_space'))+(A.pub_breaker_space==='לא'?fldF('מיקום התקנת מפסק',v('pub_breaker_location')):'')+fld('מקום לפחת',v('pub_rcbo_space'))+(A.pub_rcbo_space==='לא'?fldF('מיקום התקנת פחת',v('pub_rcbo_location')):'')+fld('חיבור לפסי צבירה',v('pub_busbar'))+fldF('הערות',v('pub_notes'));if(isS)c=fld('סוג מבנה',v('building_type'))+fld('סוג פילר',v('pillar_type'))+fldF('מיקום המונה',v('meter_location'))+fld('סוג מפסק ראשי',v('split_phase_type'))+fld('גודל מפסק ראשי',v('split_breaker_size'))+fld('כבל מזין',v('split_cable'))+fld('מקום ללוח פיצול',v('split_panel_space'))+fld('גודל לוח פיצול',v('split_panel_size'))+fld('הארקה ליד לוח',v('split_grounding'))+fld('מפתח חדר מונים',v('meter_room_key'))+fld('מחזיק המפתח',v('meter_key_holder'))+(A.meter_room_key==='כן'?`<div class="note-box full">⚠️ יש לעדכן את הלקוח שביום ההתקנה נדרש לפתוח את חדר המונים!</div>`:'')+fld('נדרש מופה',v('needs_mufah'));return section('שיטת חיבור: '+conn,c)+imgBlock('pub_panel_photo','תמונת לוח החשמל הציבורי')+imgBlock('pub_busbar_photo','תמונת פסי צבירה / מקור הזנה')+imgBlock('meter_photo','תמונת מיקום המונה')+imgBlock('split_panel_photo','תמונת מיקום לוח הפיצול')+imgBlock('split_grounding_photo','תמונת חיבור הארקה')+imgBlock('apt_panel_photo','תמונת לוח החשמל הדירתי')}

<td>אלקטרודה לארקה מקומית + מהדק</td><td>—</td><td>1</td><td>נדרש לקחת להתקנה קונגו לדפיקה של האלקטרודה באדמה</td></tr>`:''}${A.electrode_needed==='כן'&&yes('grounding_wire_meters')?`<tr><td>גיד הארקה 10 ממ״ר</td><td>—</td><td>${escapeHTML(v('grounding_wire_meters'))} מטר</td><td></td></tr>`:''}${o.mufah?`<tr><td>${escapeHTML(o.mufah)}</td><td>—</td><td>1</td><td>לפיצול מונה</td></tr>`:''}${yes('flex_wire_size')?`<tr><td>גיד גמיש – ${escapeHTML(v('flex_wire_size'))}</td><td>—</td><td>${escapeHTML(v('flex_wire_meters'))} מטר</td><td>יש לוודא שיש סופיות מתאימות לגיד הגמיש</td></tr>`:''}${yes('cat_cable')?`<tr><td>כבל רשת ${escapeHTML(v('cat_cable'))}</td><td>—</td><td>${yes('cat_cable_meters')?escapeHTML(v('cat_cable_meters'))+' מטר':''}</td><td></td></tr>`:''}${o.shaftPipe?`<tr><td>${escapeHTML(o.shaftPipe)}</td><td>—</td><td>${escapeHTML(v('shaft_pipe_length'))} מטר</td><td>לטובת מעבר בפירים</td></tr>`:''}${o.floatingPipe?`<tr><td>${escapeHTML(o.floatingPipe)}</td><td>—</td><td>${o.groundPipeMeters} מטר</td><td>חושב אוטומטית לפי חפירה + הרמת משתלבות</td></tr>`:''}${o.extraRows}</table>`}
function workTable(){const has=parseInt(A.work_dig)>0||parseInt(A.work_lift)>0||parseInt(A.work_concrete)>0||parseInt(A.work_gypsum)>0||A.work_other_name;if(!has)return '';return `<div class="section-title">עבודות לא סטנדרטיות</div><table><tr><th>סוג העבודה</th><th>יחידת מידה</th><th>כמות</th></tr>${parseInt(A.work_dig)>0?`<tr><td>עבודות חפירה</td><td>מטרים</td><td>${A.work_dig}</td></tr>`:''}${parseInt(A.work_lift)>0?`<tr><td>הרמת משתלבות וחפירה</td><td>מטרים</td><td>${A.work_lift}</td></tr>`:''}${parseInt(A.work_concrete)>0?`<tr><td>יציקת בטון לסטנד</td><td>יחידות</td><td>${A.work_concrete}</td></tr>`:''}${parseInt(A.work_gypsum)>0?`<tr><td>עבודות גבס</td><td>${escapeHTML(A.work_gypsum_loc||'—')}</td><td>${A.work_gypsum}</td></tr>`:''}${A.work_other_name?`<tr><td>${escapeHTML(A.work_other_name)}</td><td>${escapeHTML(A.work_other_unit||'—')}</td><td>${escapeHTML(A.work_other_qty||'—')}</td></tr>`:''}</table>`}function toolsBlock(){return Array.isArray(A.special_tools)&&A.special_tools.length?`<div class="section-title">כלי עבודה מיוחדים</div><p style="font-size:13px;padding:6px 0">${escapeHTML(A.special_tools.join(' | '))}${A.ladder_detail?' – '+escapeHTML(A.ladder_detail):''}${A.tools_other?' – '+escapeHTML(A.tools_other):''}</p>`:''}
function escapeHTML(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function escapeAttr(s){return escapeHTML(s)}
