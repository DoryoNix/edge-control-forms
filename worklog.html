<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Edge Control – יומן עבודה</title><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script><style>
:root{--blue:#1a56db;--blue-dark:#1139a0;--light:#eef2ff;--green:#059669;--border:#e5e7eb;--bg:#f8fafc;--gray:#6b7280}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Heebo',sans-serif;direction:rtl;background:var(--bg);color:#111;min-height:100vh}a{text-decoration:none;color:inherit}.hero{background:linear-gradient(135deg,#0d1f4a 0%,#1a3a7a 60%,#1a56db 100%);padding:42px 22px;color:white;text-align:center}.brand{font-size:13px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:10px}.hero h1{font-size:28px;line-height:1.25}.hero p{font-size:14px;color:rgba(255,255,255,.75);margin-top:8px}.wrap{max-width:900px;margin:0 auto;padding:24px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:white;border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 4px 18px rgba(0,0,0,.05);transition:.18s;display:flex;flex-direction:column;min-height:190px}.card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.1);border-color:#b8c8ff}.ico{font-size:34px;margin-bottom:12px}.card h2{font-size:18px;margin-bottom:8px}.card p{font-size:13px;color:var(--gray);line-height:1.65;flex:1}.btn{display:inline-block;background:var(--blue);color:white;border:none;border-radius:10px;padding:10px 16px;font-weight:800;font-size:14px;margin-top:16px;text-align:center;cursor:pointer}.topbar{background:linear-gradient(90deg,var(--blue-dark),var(--blue));color:white;padding:13px 16px;display:flex;gap:10px;align-items:center}.back{background:rgba(255,255,255,.15);padding:7px 12px;border-radius:8px;font-size:13px}.panel{background:white;border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:0 4px 18px rgba(0,0,0,.05)}label{display:block;font-weight:700;font-size:13px;margin:14px 0 5px;color:#1f2937}input,textarea,select{width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Heebo',sans-serif;font-size:14px;direction:rtl}textarea{min-height:90px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn.secondary{background:white;color:var(--blue);border:2px solid var(--blue)}.report{background:white;display:none;margin-top:18px;border:1px solid var(--border);border-radius:16px;padding:20px}.report h2{color:var(--blue);margin-bottom:12px}.report-section{margin:14px 0}.report-section h3{background:var(--blue);color:white;border-radius:6px;padding:7px 12px;font-size:14px;margin-bottom:8px}.field{border-bottom:1px solid #eee;padding:7px 0}.field b{color:var(--blue)}@media(max-width:760px){.grid,.row{grid-template-columns:1fr}.hero h1{font-size:24px}.wrap{padding:16px}.card{min-height:auto}}
</style></head><body>
<div class="topbar"><a class="back" href="index.html">← חזרה למסך הראשי</a><strong>📋 יומן עבודה</strong></div>
<main class="wrap"><div class="panel"><h1 style="color:var(--blue);font-size:22px;margin-bottom:8px">יומן עבודה</h1><p style="color:var(--gray);font-size:13px">מלא את הפרטים ולחץ על יצירת דוח. לאחר מכן ניתן להוריד PDF.</p><label>תאריך עבודה</label><input id="date" type="date">
<label>שם אתר / פרויקט</label><input id="site" type="text">
<label>מנהל עבודה / אחראי</label><input id="manager" type="text">
<label>שמות עובדים</label><textarea id="workers"></textarea>
<label>שעת התחלה</label><input id="start" type="time">
<label>שעת סיום</label><input id="end" type="time">
<label>עבודות שבוצעו היום</label><textarea id="work"></textarea>
<label>ציוד / חומרים שהיו בשימוש</label><textarea id="equipment"></textarea>
<label>חריגים / עיכובים / הערות בטיחות</label><textarea id="issues"></textarea>
<label>משימות להמשך</label><textarea id="tomorrow"></textarea><div class="actions"><button class="btn" onclick="makeReport()">צור דוח</button><button class="btn secondary" onclick="downloadPDF()">הורד PDF</button><button class="btn secondary" onclick="window.print()">הדפס</button></div></div><div class="report" id="report"></div></main>
<script>
const FIELDS=[('date', 'תאריך עבודה'), ('site', 'שם אתר / פרויקט'), ('manager', 'מנהל עבודה / אחראי'), ('workers', 'שמות עובדים'), ('start', 'שעת התחלה'), ('end', 'שעת סיום'), ('work', 'עבודות שבוצעו היום'), ('equipment', 'ציוד / חומרים שהיו בשימוש'), ('issues', 'חריגים / עיכובים / הערות בטיחות'), ('tomorrow', 'משימות להמשך')];
function val(id){return document.getElementById(id)?.value || '—'}
function makeReport(){
 let html=`<h2>Edge Control Ltd</h2><div style="font-size:18px;font-weight:800;color:#1a56db;margin-bottom:10px">יומן עבודה</div>`;
 html+=`<div class="report-section"><h3>פרטי הדוח</h3>`;
 FIELDS.forEach(([id,label])=>{html+=`<div class="field"><b>${label}:</b> ${val(id)}</div>`});
 html+=`</div><div style="margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:40px"><div style="border-top:1px solid #333;text-align:center;padding-top:6px">חתימת העובד</div><div style="border-top:1px solid #333;text-align:center;padding-top:6px">חתימת לקוח / מנהל</div></div>`;
 const r=document.getElementById('report'); r.innerHTML=html; r.style.display='block'; r.scrollIntoView({behavior:'smooth'});
}
function downloadPDF(){
 makeReport();
 const name='worklog_'+(new Date().toISOString().slice(0,10))+'.pdf';
 html2pdf().set({margin:8,filename:name,image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(document.getElementById('report')).save();
}
</script></body></html>
