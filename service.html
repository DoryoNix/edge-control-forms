<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Edge Control – דוח קריאת טכנאי</title><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>
:root{
  --bg:#f6f8f6;--surface:#ffffff;--ink:#101510;--muted:#6b7280;--line:#dfe6df;
  --black:#050505;--black2:#121212;--green:#43b02a;--green2:#2f8f22;--soft:#edf8ea;--danger:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;max-width:100%;overflow-x:hidden}
body{font-family:'Heebo',Arial,sans-serif;direction:rtl;background:var(--bg);color:var(--ink);min-height:100vh}
a{text-decoration:none;color:inherit}button,input,textarea,select{font-family:'Heebo',Arial,sans-serif}
.app-header{background:radial-gradient(circle at 20% 20%,rgba(67,176,42,.22),transparent 28%),linear-gradient(135deg,#000 0%,#111 65%,#1f391a 100%);color:white;padding:22px 18px 26px;border-bottom:5px solid var(--green);box-shadow:0 8px 28px rgba(0,0,0,.18)}
.header-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px}
.logo-img{width:180px;max-width:45vw;height:auto;object-fit:contain}.header-title{text-align:right;flex:1}.header-title h1{font-size:26px;font-weight:800;line-height:1.2}.header-title p{font-size:14px;color:rgba(255,255,255,.76);margin-top:6px}.back-link{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:9px 12px;font-size:13px;font-weight:700;color:white}.wrap{max-width:980px;margin:0 auto;padding:22px 18px 90px}.hero-card{background:linear-gradient(180deg,#101010,#050505);color:white;border-radius:24px;padding:28px 22px;border:1px solid #252525;box-shadow:0 12px 35px rgba(0,0,0,.18);position:relative;overflow:hidden}.hero-card:after{content:'';position:absolute;inset:auto -60px -90px auto;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(67,176,42,.22),transparent 68%)}.hero-logo{width:230px;max-width:70%;margin:0 auto 22px;display:block}.hero-card h1{text-align:center;font-size:32px;line-height:1.2}.hero-card h1 span{color:var(--green)}.hero-card p{text-align:center;color:rgba(255,255,255,.75);font-size:15px;line-height:1.7;margin-top:12px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}.card{background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 6px 24px rgba(0,0,0,.06);transition:.18s;display:flex;flex-direction:column;min-height:210px}.card:hover{transform:translateY(-3px);border-color:rgba(67,176,42,.45);box-shadow:0 14px 32px rgba(0,0,0,.11)}.ico{font-size:34px;margin-bottom:12px}.card h2{font-size:19px;margin-bottom:8px}.card p{font-size:13px;color:var(--muted);line-height:1.65;flex:1}.btn{border:none;border-radius:13px;padding:12px 16px;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--green),var(--green2));color:white;box-shadow:0 6px 18px rgba(67,176,42,.22);display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.secondary{background:white;color:var(--ink);border:1.5px solid var(--line);box-shadow:none}.btn.dark{background:#111;color:white}.btn.danger{background:#fee2e2;color:#991b1b;box-shadow:none}.panel{background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 8px 28px rgba(0,0,0,.06)}.panel h2{font-size:22px;margin-bottom:6px}.sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px}.section{margin-top:18px;border-top:1px solid var(--line);padding-top:16px}.section-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;margin-bottom:10px}.section-title:before{content:'';width:8px;height:24px;border-radius:9px;background:var(--green)}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row.three{grid-template-columns:repeat(3,1fr)}label{display:block;font-weight:700;font-size:13px;margin:12px 0 5px;color:#1f2937}input,textarea,select{width:100%;border:2px solid var(--line);border-radius:13px;padding:11px 12px;font-size:14px;direction:rtl;background:#fff;outline:none}textarea{min-height:92px;resize:vertical}input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(67,176,42,.1)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.sticky-actions{position:sticky;bottom:0;background:rgba(246,248,246,.92);backdrop-filter:blur(10px);padding:12px 0;margin-top:20px;border-top:1px solid var(--line)}.hint{background:var(--soft);border:1px solid rgba(67,176,42,.22);border-radius:14px;padding:10px 12px;color:#24551b;font-size:13px;margin:12px 0}.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.thumb{width:78px;height:78px;border-radius:12px;object-fit:cover;border:2px solid var(--line)}.report{display:none;background:white;border:1px solid var(--line);border-radius:22px;margin-top:18px;padding:22px;box-shadow:0 8px 28px rgba(0,0,0,.06)}.report-doc{background:#fff;color:#111;direction:rtl}.report-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:4px solid var(--green);padding-bottom:14px;margin-bottom:18px}.report-head img{width:145px;max-width:42%;height:auto;object-fit:contain;background:#000;border-radius:8px;padding:8px}.report-title{font-size:22px;font-weight:900;color:#111}.report-meta{font-size:12px;color:#555;line-height:1.7;text-align:left;direction:ltr}.rep-section-title{background:#111;color:#fff;border-right:7px solid var(--green);border-radius:8px;padding:8px 12px;font-size:14px;font-weight:800;margin:18px 0 8px}.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px}.field{border-bottom:1px solid #e9ece9;padding:8px 2px;break-inside:avoid}.field b{display:block;color:var(--green2);font-size:11px;margin-bottom:2px}.field span{font-weight:600;white-space:pre-wrap;overflow-wrap:anywhere}.full{grid-column:1/-1}.rep-table{width:100%;border-collapse:collapse;table-layout:fixed}.rep-table th{background:#f0f5f0;color:#111;border:1px solid #ddd;padding:8px;font-size:12px}.rep-table td{border:1px solid #ddd;padding:8px;font-size:12px;vertical-align:top;overflow-wrap:anywhere}.sig-area{border:1px solid #ddd;border-radius:12px;padding:14px;margin-top:10px;max-width:390px}.sig-area img{max-width:100%;height:auto;display:block}.signature-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:999999;display:flex;align-items:center;justify-content:center;padding:16px}.signature-box{background:white;border-radius:18px;padding:18px;width:100%;max-width:540px;text-align:center}.signature-box canvas{width:100%;height:190px;border:2px solid var(--line);border-radius:14px;background:#fff;touch-action:none}.footer-note{text-align:center;color:#8b928b;font-size:12px;margin-top:24px}.draft-bar{display:none;background:#e9f8e5;border:1px solid rgba(67,176,42,.3);border-radius:16px;padding:12px;margin-bottom:14px;color:#24551b;font-weight:700}.draft-bar.show{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
@media(max-width:760px){.header-inner{flex-direction:column;text-align:center}.header-title{text-align:center}.logo-img{width:210px;max-width:75vw}.cards,.row,.row.three,.rep-grid{grid-template-columns:1fr}.wrap{padding:16px 14px 95px}.hero-card h1{font-size:27px}.actions .btn,.sticky-actions .btn{width:100%}.report-head{flex-direction:column;text-align:center;align-items:center}.report-meta{text-align:center}.panel{padding:18px}.app-header{padding-top:18px}.card{min-height:auto}.report-actions{padding-bottom:calc(10px + env(safe-area-inset-bottom))}}
@media print{body{background:#fff}.app-header,.wrap>.panel,.sticky-actions,.actions,.draft-bar,.footer-note,.top-only{display:none!important}.wrap{padding:0;max-width:none}.report{display:block!important;border:none;box-shadow:none;margin:0;padding:0}.report-doc{padding:8mm}.rep-section-title{break-after:avoid}.field,.sig-area,tr{break-inside:avoid}}
</style></head><body data-draft-key="edge_service_draft_v3">
<header class="app-header"><div class="header-inner"><img class="logo-img" src="edge-logo.jpg" alt="Edge Control"><div class="header-title"><h1>🛠️ דוח קריאת טכנאי</h1><p>מילוי דוח, שמירת טיוטה, תמונות, חתימות ושמירה כ־PDF.</p></div><a class="back-link" href="index.html">← חזרה</a></div></header>
<main class="wrap"><div id="draftBar" class="draft-bar"><span></span><button class="btn secondary" onclick="clearDraft()">מחק טיוטה</button></div><section class="panel"><h2>דוח קריאת טכנאי</h2><p class="sub">הטופס נשמר אוטומטית תוך כדי מילוי. בסיום ניתן לצפות בדוח, לחתום ולשמור כ־PDF.</p>
<div class="section"><div class="section-title">פרטי הדוח</div><div class="row"><label>תאריך הקריאה</label><input id="date" type="date" data-save><label>שם הטכנאי</label><input id="tech" type="text" data-save><label>שם לקוח / אתר</label><input id="customer" type="text" data-save><label>כתובת</label><input id="address" type="text" data-save><label>מספר / דגם עמדה</label><input id="charger" type="text" data-save><label>מספר סידורי / מזהה עמדה</label><input id="serial" type="text" data-save><label>תיאור התקלה</label><textarea id="fault" data-save></textarea><label>ממצאי בדיקה / אבחון</label><textarea id="diagnosis" data-save></textarea><label>פעולות שבוצעו</label><textarea id="actionsDone" data-save></textarea><label>חלקים שהוחלפו / נדרשים</label><textarea id="parts" data-save></textarea><label>סטטוס סיום</label><select id="status" data-save><option>טופל והסתיים</option><option>נדרש ביקור נוסף</option><option>נדרש ציוד נוסף</option><option>הועבר להמשך טיפול</option></select><label>הערות והמלצות להמשך</label><textarea id="notes" data-save></textarea></div></div>
<div class="section"><div class="section-title">תמונות ונספחים</div><label>תמונות לפני טיפול</label><input type="file" accept="image/*" multiple onchange="handleImages(this,'before')"><div class="thumbs" id="thumbs_before"></div><label>תמונות אחרי טיפול</label><input type="file" accept="image/*" multiple onchange="handleImages(this,'after')"><div class="thumbs" id="thumbs_after"></div><label>תמונות תקלה / ציוד</label><input type="file" accept="image/*" multiple onchange="handleImages(this,'faultimg')"><div class="thumbs" id="thumbs_faultimg"></div></div>
<div class="sticky-actions"><div class="actions"><button class="btn" onclick="makeReport()">צור / רענן דוח</button><button class="btn secondary" onclick="openSignaturePad('tech')">✍️ חתימת עובד</button><button class="btn secondary" onclick="openSignaturePad('customer')">✍️ חתימת לקוח / מנהל</button><button class="btn" onclick="saveAsPDF()">🖨️ שמירה כ־PDF</button><button class="btn secondary" onclick="downloadHTML()">⬇️ HTML</button></div></div>
</section><section class="report" id="report"></section><p class="footer-note">Edge Control Ltd | מערכת דוחות פנימית</p></main>
<script>
const DRAFT_KEY = document.body.dataset.draftKey;
let images = {};
let customerSignature = '';
let technicianSignature = '';
function el(id){return document.getElementById(id)}
function val(id){return el(id)?.value?.trim() || '—'}
function esc(s){return String(s ?? '').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function cleanFilePart(value){return (value||'').toString().trim().replace(/[\\/:*?"<>|]/g,'-').replace(/\s+/g,' ') || 'ללא שם'}
function collectFields(fields){const data={};fields.forEach(f=>data[f.id]=val(f.id));return data}
function saveDraft(){try{const ids=[...document.querySelectorAll('[data-save]')].map(x=>x.id);const form={};ids.forEach(id=>form[id]=el(id)?.value||'');const data={form,images,customerSignature,technicianSignature,ts:Date.now()};localStorage.setItem(DRAFT_KEY,JSON.stringify(data));sessionStorage.setItem(DRAFT_KEY,JSON.stringify(data));showDraftBar('הטיוטה נשמרה אוטומטית')}catch(e){console.log('draft save failed',e)}}
function loadDraft(){try{const raw=localStorage.getItem(DRAFT_KEY)||sessionStorage.getItem(DRAFT_KEY);if(!raw)return false;const data=JSON.parse(raw);Object.entries(data.form||{}).forEach(([id,v])=>{if(el(id))el(id).value=v});images=data.images||{};customerSignature=data.customerSignature||'';technicianSignature=data.technicianSignature||'';renderThumbsAll();showDraftBar('נמצאה טיוטה שמורה ושוחזרה');return true}catch(e){console.log('draft load failed',e);return false}}
function clearDraft(){localStorage.removeItem(DRAFT_KEY);sessionStorage.removeItem(DRAFT_KEY);showDraftBar('הטיוטה נמחקה')}
function showDraftBar(text){const b=el('draftBar');if(!b)return;b.classList.add('show');b.querySelector('span').textContent=text}
function attachAutosave(){document.querySelectorAll('[data-save]').forEach(x=>{x.addEventListener('input',saveDraft);x.addEventListener('change',saveDraft)});window.addEventListener('beforeunload',saveDraft)}
function handleImages(input,key){if(!images[key])images[key]=[];Array.from(input.files||[]).forEach(file=>{const r=new FileReader();r.onload=e=>{images[key].push(e.target.result);renderThumbs(key);saveDraft()};r.readAsDataURL(file)})}
function renderThumbs(key){const box=el('thumbs_'+key);if(!box)return;box.innerHTML=(images[key]||[]).map(src=>`<img class="thumb" src="${src}">`).join('')}
function renderThumbsAll(){Object.keys(images||{}).forEach(renderThumbs)}
function imageBlock(key,title){if(!images[key]||!images[key].length)return '';return `<div class="rep-section-title">${esc(title)}</div><div style="display:flex;flex-wrap:wrap;gap:8px">${images[key].map(src=>`<img src="${src}" style="width:150px;max-height:130px;object-fit:cover;border:1px solid #ddd;border-radius:10px">`).join('')}</div>`}
function field(label,value,full=false){if(!value||value==='—')return '';return `<div class="field ${full?'full':''}"><b>${esc(label)}</b><span>${esc(value)}</span></div>`}
function openSignaturePad(type){const overlay=document.createElement('div');overlay.className='signature-overlay';overlay.id='signatureOverlay';overlay.innerHTML=`<div class="signature-box"><h2 style="color:#43b02a;margin-bottom:8px">${type==='tech'?'חתימת טכנאי / עובד':'חתימת לקוח / מנהל'}</h2><p class="sub">חתום על המסך ושמור את החתימה בדוח.</p><canvas id="signatureCanvas" width="500" height="190"></canvas><div class="actions"><button class="btn secondary" onclick="clearSignatureCanvas()">נקה</button><button class="btn" onclick="saveSignature('${type}')">שמור חתימה</button><button class="btn dark" onclick="closeSignaturePad()">ביטול</button></div></div>`;document.body.appendChild(overlay);initSignatureCanvas()}
function initSignatureCanvas(){const canvas=el('signatureCanvas'),ctx=canvas.getContext('2d');let drawing=false;ctx.lineWidth=2.6;ctx.lineCap='round';ctx.strokeStyle='#111';function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)}}function start(e){e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)}function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke()}function end(e){if(e)e.preventDefault();drawing=false}['mousedown','touchstart'].forEach(ev=>canvas.addEventListener(ev,start,{passive:false}));['mousemove','touchmove'].forEach(ev=>canvas.addEventListener(ev,move,{passive:false}));['mouseup','mouseleave','touchend'].forEach(ev=>canvas.addEventListener(ev,end,{passive:false}))}
function clearSignatureCanvas(){const c=el('signatureCanvas');c.getContext('2d').clearRect(0,0,c.width,c.height)}
function saveSignature(type){const c=el('signatureCanvas');if(type==='tech')technicianSignature=c.toDataURL('image/png');else customerSignature=c.toDataURL('image/png');closeSignaturePad();saveDraft();makeReport();alert('החתימה נשמרה בדוח')}
function closeSignaturePad(){el('signatureOverlay')?.remove()}
function sigBlock(title,src){return src?`<div class="sig-area"><b>${esc(title)}</b><img src="${src}"></div>`:''}
function reportHeader(title){return `<div class="report-doc"><div class="report-head"><img src="edge-logo.jpg"><div><div class="report-title">${esc(title)}</div><div style="color:#43b02a;font-weight:800;margin-top:4px">Edge Control</div></div><div class="report-meta">Imber 24, Petah Tikva, Israel<br>Tel: 073-3318500<br>office@edgecontrol.net<br>www.EdgeControl.co.il</div></div>`}
function printReport(){makeReport();setTimeout(()=>window.print(),200)}
function saveAsPDF(){makeReport();const html=`<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><title>${esc(fileBase())}</title><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>${document.querySelector('style').textContent}</style></head><body><main class="wrap"><div class="report" style="display:block">${el('report').innerHTML}</div></main></body></html>`;const w=window.open('','_blank');if(!w){alert('הדפדפן חסם חלון הדפסה. יש לאפשר Popups.');return}w.document.open();w.document.write(html);w.document.close();setTimeout(()=>{w.focus();w.onafterprint=()=>w.close();w.print()},700)}
function downloadHTML(){makeReport();const html=`<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><title>${esc(fileBase())}</title><style>${document.querySelector('style').textContent}</style></head><body><main class="wrap"><div class="report" style="display:block">${el('report').innerHTML}</div></main></body></html>`;const blob=new Blob([html],{type:'text/html;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fileBase()+'.html';document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},500)}
window.addEventListener('load',()=>{attachAutosave();loadDraft()});

const FIELDS=[{"id": "date", "label": "תאריך הקריאה"}, {"id": "tech", "label": "שם הטכנאי"}, {"id": "customer", "label": "שם לקוח / אתר"}, {"id": "address", "label": "כתובת"}, {"id": "charger", "label": "מספר / דגם עמדה"}, {"id": "serial", "label": "מספר סידורי / מזהה עמדה"}, {"id": "fault", "label": "תיאור התקלה"}, {"id": "diagnosis", "label": "ממצאי בדיקה / אבחון"}, {"id": "actionsDone", "label": "פעולות שבוצעו"}, {"id": "parts", "label": "חלקים שהוחלפו / נדרשים"}, {"id": "status", "label": "סטטוס סיום"}, {"id": "notes", "label": "הערות והמלצות להמשך"}];
function fileBase(){return `דוח שירות - ${cleanFilePart(val('customer'))} - ${cleanFilePart(val('date'))}`;}
function makeReport(){
  const data=collectFields(FIELDS);
  let html=reportHeader('דוח קריאת טכנאי');
  html+=`<div class="rep-section-title">פרטי הדוח</div><div class="rep-grid">`;
  FIELDS.forEach(f=>{ const full=['fault','diagnosis','actionsDone','parts','notes','workers','work','equipment','issues','tomorrow'].includes(f.id); html+=field(f.label,data[f.id],full); });
  html+=`</div>`;
  html +imageBlock('before','תמונות לפני טיפול')+imageBlock('after','תמונות אחרי טיפול')+imageBlock('faultimg','תמונות תקלה / ציוד');
  html+=`<div class="rep-section-title">חתימות ואישור</div><div class="hint">החותמים מאשרים כי הפרטים בדוח נבדקו ונקראו.</div>`;
  html+=sigBlock('חתימת עובד / טכנאי',technicianSignature);
  html+=sigBlock('חתימת לקוח / מנהל',customerSignature);
  html+=`</div>`;
  const r=el('report'); r.innerHTML=html; r.style.display='block'; r.scrollIntoView({behavior:'smooth'}); saveDraft();
}
</script></body></html>
