<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Edge Control – דוח קריאת טכנאי</title><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/app.css"></head><body><div class="app-shell"><div class="topbar"><a class="back" href="index.html">← חזרה</a><div class="page-title">🛠️ דוח קריאת טכנאי</div><img class="topbar-logo" src="assets/img/edge-logo.jpg" alt="Edge Control"></div><main class="wrap"><section class="panel"><h1>🛠️ דוח קריאת טכנאי</h1><p class="panel-sub">מלא את הטופס, הוסף תמונות וחתימות לפי הצורך. הנתונים נשמרים אוטומטית בטיוטה במכשיר.</p><div class="autosave-note" id="draft-note">שמירה אוטומטית פעילה</div><div id="dynamic-form" class="form-grid"></div><div class="actions"><button class="btn" id="make-report">צור / עדכן דוח</button><button class="btn secondary" id="sig-tech">חתימת טכנאי</button><button class="btn secondary" id="sig-client">חתימת לקוח</button><button class="btn dark" id="print-pdf">שמירה כ־PDF / הדפסה</button><button class="btn warn" id="clear-draft">מחק טיוטה</button></div></section><section class="report" id="report"></section><p class="footer-note">Edge Control Ltd | מערכת טפסים ודוחות</p></main></div><div class="modal" id="signature-modal"><div class="modal-card"><h2 id="sig-title">חתימה</h2><p class="panel-sub">חתום בתוך המסגרת ושמור את החתימה לדוח.</p><canvas id="signature-canvas" class="signature-canvas" width="520" height="190"></canvas><div class="actions"><button class="btn secondary" onclick="clearSignature()">נקה</button><button class="btn" onclick="saveSignature()">שמור חתימה</button><button class="btn dark" onclick="closeSignature()">ביטול</button></div></div></div><script>window.FORM_CONFIG={"id": "service", "title": "דוח קריאת טכנאי", "logoPath": "assets/img/edge-logo.jpg", "sections": [{"title": "פרטי קריאה ואתר", "fields": [{"id": "date", "label": "תאריך הקריאה", "type": "date", "required": true}, {"id": "time", "label": "שעת פתיחה", "type": "time"}, {"id": "tech", "label": "שם הטכנאי", "type": "text", "required": true}, {"id": "customer", "label": "שם לקוח / אתר", "type": "text", "required": true}, {"id": "address", "label": "כתובת", "type": "text", "full": true}, {"id": "charger", "label": "מספר / דגם עמדה", "type": "text"}, {"id": "serial", "label": "מספר סידורי", "type": "text"}]}, {"title": "פרטי התקלה", "fields": [{"id": "fault", "label": "תיאור התקלה", "type": "textarea", "full": true}, {"id": "status_before", "label": "מצב העמדה בהגעה", "type": "select", "options": ["לא פעילה", "פעילה חלקית", "פעילה", "אין תקשורת", "אחר"]}, {"id": "internet", "label": "מצב תקשורת", "type": "select", "options": ["תקין", "לא תקין", "SIM/4G", "LAN", "לא נבדק"]}, {"id": "fault_images", "label": "תמונות תקלה / לפני טיפול", "type": "images", "full": true}]}, {"title": "טיפול וסיכום", "fields": [{"id": "actions", "label": "פעולות שבוצעו", "type": "textarea", "full": true}, {"id": "parts", "label": "חלקים שהוחלפו / נדרשים", "type": "textarea", "full": true}, {"id": "result", "label": "סטטוס סיום", "type": "select", "options": ["טופל והסתיים", "נדרש ביקור נוסף", "נדרש ציוד נוסף", "הועבר להמשך טיפול", "לא טופל"]}, {"id": "recommendations", "label": "הערות והמלצות להמשך", "type": "textarea", "full": true}, {"id": "after_images", "label": "תמונות לאחר טיפול", "type": "images", "full": true}]}], "fileFields": ["customer", "date"]};</script><script src="assets/js/form-engine.js"></script></body></html>
