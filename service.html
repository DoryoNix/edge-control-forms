<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Edge Control – דוח קריאת טכנאי</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --green:#43b02a;
      --green-light:#ecfdf3;
      --black:#050505;
      --dark:#111;
      --bg:#f7faf7;
      --border:#e5e7eb;
      --gray:#6b7280;
      --danger:#dc2626;
      --warn:#f59e0b;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;max-width:100%;overflow-x:hidden}
    body{
      font-family:'Heebo',Arial,sans-serif;
      direction:rtl;
      background:var(--bg);
      color:#111;
      min-height:100vh;
    }

    button,input,textarea,select{font-family:'Heebo',Arial,sans-serif}
    button{cursor:pointer}

    .app-shell{min-height:100vh}
    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      align-items:center;
      gap:12px;
      background:linear-gradient(90deg,#000,#111);
      color:#fff;
      padding:12px 16px;
      border-bottom:3px solid var(--green);
      box-shadow:0 2px 14px rgba(0,0,0,.22);
      flex-wrap:wrap;
    }

    .back{
      color:#fff;
      text-decoration:none;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      border-radius:10px;
      padding:7px 12px;
      font-size:13px;
      font-weight:700;
    }

    .page-title{
      font-size:16px;
      font-weight:900;
      flex:1;
      min-width:190px;
    }

    .topbar-logo{
      width:150px;
      max-width:34vw;
      height:auto;
      border-radius:8px;
      background:#050505;
    }

    .wrap{
      max-width:1060px;
      margin:0 auto;
      padding:18px 16px 34px;
    }

    .panel,.report{
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:0 8px 28px rgba(0,0,0,.06);
      padding:22px;
    }

    .panel h1{
      color:var(--black);
      font-size:26px;
      font-weight:900;
      margin-bottom:6px;
    }

    .panel-sub{
      color:var(--gray);
      font-size:14px;
      line-height:1.7;
      margin-bottom:12px;
    }

    .autosave-note{
      display:inline-flex;
      align-items:center;
      gap:7px;
      background:var(--green-light);
      color:#166534;
      border:1px solid #bbf7d0;
      border-radius:999px;
      padding:7px 12px;
      font-size:12px;
      font-weight:800;
      margin-bottom:18px;
    }

    .autosave-note:before{content:'●';color:var(--green)}

    .section{
      margin:18px 0 22px;
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    .section-title{
      background:linear-gradient(90deg,#050505,#171717);
      color:#fff;
      border-bottom:3px solid var(--green);
      padding:11px 14px;
      font-size:15px;
      font-weight:900;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      padding:16px;
    }

    .field{min-width:0}
    .field.full{grid-column:1/-1}

    label{
      display:block;
      font-size:13px;
      color:#1f2937;
      font-weight:900;
      margin-bottom:6px;
    }

    .required-mark{color:var(--danger);font-weight:900;margin-right:4px}

    input,textarea,select{
      width:100%;
      border:2px solid var(--border);
      border-radius:12px;
      padding:11px 12px;
      font-size:14px;
      outline:none;
      background:#fff;
      color:#111;
      direction:rtl;
    }

    input:focus,textarea:focus,select:focus{
      border-color:var(--green);
      box-shadow:0 0 0 3px rgba(67,176,42,.12);
    }

    textarea{min-height:105px;resize:vertical}

    .hint{
      display:block;
      color:#6b7280;
      font-size:12px;
      line-height:1.55;
      margin-top:6px;
    }

    .image-box{
      border:2px dashed var(--green);
      background:var(--green-light);
      color:#166534;
      border-radius:14px;
      padding:16px;
      text-align:center;
      font-weight:900;
      cursor:pointer;
    }

    .image-input{display:none}
    .image-preview{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .image-preview img{
      width:84px;
      height:84px;
      object-fit:cover;
      border-radius:12px;
      border:2px solid var(--border);
      background:#fff;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .btn{
      border:none;
      background:linear-gradient(135deg,#43b02a,#6bd451);
      color:#fff;
      border-radius:12px;
      padding:12px 16px;
      font-size:14px;
      font-weight:900;
      min-height:44px;
      box-shadow:0 6px 18px rgba(67,176,42,.22);
    }

    .btn.secondary{
      background:#fff;
      color:var(--green);
      border:2px solid var(--green);
      box-shadow:none;
    }

    .btn.dark{
      background:#050505;
      color:#fff;
      box-shadow:0 6px 18px rgba(0,0,0,.22);
    }

    .btn.warn{
      background:#fff7ed;
      color:#9a3412;
      border:2px solid #fb923c;
      box-shadow:none;
    }

    .report{
      display:none;
      margin-top:18px;
    }

    .report.show{display:block}

    .report-inner{
      background:#fff;
      color:#000;
      direction:rtl;
      max-width:900px;
      margin:0 auto;
      padding:0;
    }

    .report-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      border-bottom:3px solid var(--green);
      padding-bottom:14px;
      margin-bottom:18px;
    }

    .report-logo{
      width:210px;
      max-width:45%;
      height:auto;
      border-radius:8px;
      background:#050505;
    }

    .company{
      direction:ltr;
      text-align:left;
      font-size:11px;
      color:#555;
      line-height:1.7;
    }

    .report h2{
      color:var(--green);
      font-size:22px;
      font-weight:900;
      margin-bottom:14px;
    }

    .report-section-title{
      background:#050505;
      color:#fff;
      border-radius:7px;
      padding:8px 12px;
      font-weight:900;
      margin:18px 0 10px;
      break-after:avoid;
    }

    .report-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px 18px;
    }

    .report-field{
      border-bottom:1px solid #e5e7eb;
      padding:8px 4px;
      break-inside:avoid;
      min-width:0;
    }

    .report-field.full{grid-column:1/-1}

    .report-field label{
      color:var(--green);
      font-size:11px;
      margin:0 0 4px;
    }

    .report-value{
      font-size:13.5px;
      line-height:1.65;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      font-weight:600;
    }

    .report-images{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:10px;
      margin:8px 0 12px;
      background:#f8fafc;
      break-inside:avoid;
    }

    .report-images img{
      width:180px;
      max-width:100%;
      max-height:150px;
      object-fit:cover;
      border-radius:8px;
      border:1px solid #ddd;
    }

    .signature-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-top:20px;
    }

    .signature-box{
      border:1px solid #ddd;
      border-radius:10px;
      min-height:110px;
      padding:10px;
      text-align:center;
      break-inside:avoid;
    }

    .signature-box img{
      max-width:260px;
      width:100%;
      max-height:95px;
      object-fit:contain;
      margin:0 auto;
    }

    .footer-note{
      text-align:center;
      color:#9ca3af;
      font-size:12px;
      padding:20px 0;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      z-index:999;
      background:rgba(0,0,0,.68);
      padding:16px;
      align-items:center;
      justify-content:center;
    }

    .modal.show{display:flex}

    .modal-card{
      background:#fff;
      border-radius:18px;
      padding:18px;
      width:100%;
      max-width:560px;
      text-align:center;
    }

    .modal-card h2{
      color:var(--green);
      font-size:20px;
      margin-bottom:6px;
    }

    .signature-canvas{
      width:100%;
      height:190px;
      border:2px solid var(--border);
      border-radius:14px;
      background:#fff;
      touch-action:none;
      margin-top:8px;
    }

    .error-box{
      display:none;
      background:#fef2f2;
      border:1px solid #fecaca;
      color:#991b1b;
      border-radius:14px;
      padding:12px 14px;
      margin:14px 0;
      font-size:13px;
      line-height:1.7;
    }

    .error-box.show{display:block}
    .error-box strong{display:block;margin-bottom:6px}

    @media(max-width:720px){
      .wrap{padding:14px 12px 28px}
      .panel,.report{padding:16px;border-radius:16px}
      .form-grid,.report-grid,.signature-row{grid-template-columns:1fr}
      .field.full,.report-field.full{grid-column:auto}
      .topbar-logo{width:118px}
      .page-title{font-size:14px}
      .actions{flex-direction:column}
      .btn{width:100%}
      .report-header{flex-direction:column}
      .report-logo{max-width:100%;width:220px}
      .company{text-align:right;direction:ltr}
    }

    @media print{
      body{background:#fff;padding:0}
      .app-shell>.topbar,
      .panel,
      .footer-note,
      .actions,
      .modal{display:none!important}
      .wrap{max-width:none;padding:0}
      .report{display:block!important;border:none;box-shadow:none;padding:10mm;margin:0}
      .report-inner{max-width:180mm}
      .report-section-title,.signature-box,.report-images{break-inside:avoid;page-break-inside:avoid}
      img{break-inside:avoid;page-break-inside:avoid}
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <div class="topbar">
      <a class="back" href="index.html">← חזרה</a>
      <div class="page-title">🛠️ דוח קריאת טכנאי</div>
      <img class="topbar-logo" src="assets/img/edge-logo.jpg" alt="Edge Control" onerror="this.style.display='none'">
    </div>

    <main class="wrap">
      <section class="panel">
        <h1>🛠️ דוח קריאת טכנאי</h1>
        <p class="panel-sub">
          מלא את הטופס, הוסף תמונות וחתימות לפי הצורך.
          הנתונים נשמרים אוטומטית כטיוטה במכשיר.
        </p>

        <div class="autosave-note" id="draft-note">שמירה אוטומטית פעילה</div>
        <div class="error-box" id="error-box"></div>
        <div id="dynamic-form"></div>

        <div class="actions">
          <button class="btn" id="make-report">צור / עדכן דוח</button>
          <button class="btn secondary" id="sig-tech">חתימת טכנאי</button>
          <button class="btn secondary" id="sig-client">חתימת לקוח</button>
          <button class="btn dark" id="print-pdf">שמירה כ־PDF / הדפסה</button>
          <button class="btn warn" id="clear-draft">מחק טיוטה</button>
        </div>
      </section>

      <section class="report" id="report"></section>
      <p class="footer-note">Edge Control Ltd | מערכת טפסים ודוחות</p>
    </main>
  </div>

  <div class="modal" id="signature-modal">
    <div class="modal-card">
      <h2 id="sig-title">חתימה</h2>
      <p class="panel-sub">חתום בתוך המסגרת ושמור את החתימה לדוח.</p>
      <canvas id="signature-canvas" class="signature-canvas" width="520" height="190"></canvas>

      <div class="actions">
        <button class="btn secondary" onclick="clearSignature()">נקה</button>
        <button class="btn" onclick="saveSignature()">שמור חתימה</button>
        <button class="btn dark" onclick="closeSignature()">ביטול</button>
      </div>
    </div>
  </div>

  <script>
    const FORM_CONFIG = {
      id: 'service',
      title: 'דוח קריאת טכנאי',
      logoPath: 'assets/img/edge-logo.jpg',
      fileFields: ['customer', 'date'],
      sections: [
        {
          title: 'פרטי קריאה ואתר',
          fields: [
            {id:'date', label:'תאריך הקריאה', type:'date', required:true},
            {id:'time', label:'שעת פתיחה', type:'time', required:true},
            {id:'tech', label:'שם הטכנאי', type:'text', required:true},
            {id:'customer', label:'שם לקוח / אתר', type:'text', required:true},
            {id:'address', label:'כתובת', type:'text', required:true, full:true},
            {id:'charger_number', label:'מספר עמדת טעינה', type:'text', required:true},
            {id:'socket_number', label:'מספר שקע', type:'text', required:true},
            {id:'charger', label:'מספר / דגם עמדה', type:'text', required:true},
            {id:'serial', label:'מספר סידורי', type:'text', required:true},
            {
              id:'arrival_images',
              label:'תמונה של עמדת הטעינה בהגעה לקריאה',
              type:'images',
              required:true,
              full:true,
              hint:'חובה להעלות לפחות תמונה אחת של עמדת הטעינה כפי שנראית בעת ההגעה לקריאה.'
            }
          ]
        },
        {
          title: 'פרטי התקלה',
          fields: [
            {id:'fault', label:'תיאור התקלה', type:'textarea', required:true, full:true},
            {
              id:'status_before',
              label:'מצב העמדה בהגעה',
              type:'select',
              required:true,
              options:['לא פעילה','פעילה חלקית','פעילה','אין תקשורת','אחר']
            },
            {
              id:'status_before_other',
              label:'פירוט מצב העמדה בהגעה',
              type:'text',
              required:true,
              showIf:{field:'status_before', value:'אחר'}
            },
            {
              id:'internet',
              label:'מצב תקשורת',
              type:'select',
              required:true,
              options:['תקין','לא תקין','SIM/4G','LAN','לא נבדק']
            },
            {
              id:'fault_images',
              label:'תמונות תקלה / לפני טיפול',
              type:'images',
              required:true,
              full:true,
              hint:'נדרש להעלות תמונות של התראות התקלה במסך, באפליקציה, או מנורות החיווי על עמדת הטעינה.'
            },
            {
              id:'fault_parts_images',
              label:'תמונות חלקים תקולים להחלפה / תיקון',
              type:'images',
              required:true,
              full:true,
              hint:'נדרש להעלות תמונות ברורות של החלקים התקולים שאותם נדרש להחליף או לתקן.'
            }
          ]
        },
        {
          title: 'טיפול וסיכום',
          fields: [
            {id:'actions', label:'פעולות שבוצעו', type:'textarea', required:true, full:true},
            {id:'parts', label:'חלקים שהוחלפו / נדרשים', type:'textarea', required:true, full:true},
            {
              id:'result',
              label:'סטטוס סיום',
              type:'select',
              required:true,
              options:['טופל והסתיים','נדרש ביקור נוסף','נדרש ציוד נוסף','הועבר להמשך טיפול','לא טופל']
            },
            {id:'recommendations', label:'הערות והמלצות להמשך', type:'textarea', required:true, full:true},
            {id:'after_images', label:'תמונות לאחר טיפול', type:'images', required:true, full:true}
          ]
        }
      ]
    };

    const SAVE_KEY = 'edge_control_form_' + FORM_CONFIG.id + '_draft_v2';

    let data = {};
    let images = {};
    let signatures = {tech:'', client:''};
    let currentSignature = null;

    const $ = selector => document.querySelector(selector);

    function allFields(){
      return FORM_CONFIG.sections.flatMap(section =>
        section.fields.map(field => ({...field, sectionTitle: section.title}))
      );
    }

    function isVisibleField(field){
      if(!field.showIf) return true;
      return data[field.showIf.field] === field.showIf.value;
    }

    function fieldValue(id){
      const value = data[id];
      return value === undefined || value === null || value === '' ? '—' : value;
    }

    function displayValue(field){
      if(field.id === 'status_before' && data.status_before === 'אחר'){
        return data.status_before_other || 'אחר';
      }
      return fieldValue(field.id);
    }

    function escapeHTML(value){
      return String(value ?? '').replace(/[&<>'"]/g, c => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        "'":'&#39;',
        '"':'&quot;'
      }[c]));
    }

    function saveDraft(){
      try{
        const payload = JSON.stringify({
          data,
          images,
          signatures,
          savedAt: new Date().toISOString()
        });

        localStorage.setItem(SAVE_KEY, payload);
        sessionStorage.setItem(SAVE_KEY, payload);

        const note = $('#draft-note');
        if(note) note.textContent = 'נשמר אוטומטית: ' + new Date().toLocaleTimeString('he-IL');
      }catch(err){
        console.warn('Draft save failed', err);
      }
    }

    function loadDraft(){
      try{
        const raw = localStorage.getItem(SAVE_KEY) || sessionStorage.getItem(SAVE_KEY);
        if(!raw) return;

        const payload = JSON.parse(raw);
        data = payload.data || {};
        images = payload.images || {};
        signatures = payload.signatures || {tech:'', client:''};
      }catch(err){
        console.warn('Draft load failed', err);
      }
    }

    function clearDraft(){
      if(!confirm('האם למחוק את הטיוטה השמורה?')) return;

      localStorage.removeItem(SAVE_KEY);
      sessionStorage.removeItem(SAVE_KEY);
      data = {};
      images = {};
      signatures = {tech:'', client:''};

      renderForm();
      $('#report').classList.remove('show');
      $('#report').innerHTML = '';
      $('#error-box').classList.remove('show');
      $('#error-box').innerHTML = '';

      alert('הטיוטה נמחקה.');
    }

    function renderForm(){
      const root = $('#dynamic-form');

      root.innerHTML = FORM_CONFIG.sections.map(section => `
        <div class="section">
          <div class="section-title">${escapeHTML(section.title)}</div>
          <div class="form-grid">
            ${section.fields.map(renderField).join('')}
          </div>
        </div>
      `).join('');

      bindInputs();
      updateConditionalFields();
    }

    function renderField(field){
      const required = field.required ? '<span class="required-mark">*</span>' : '';
      const fullClass = field.full ? ' full' : '';
      const hiddenStyle = !isVisibleField(field) ? 'style="display:none"' : '';
      const hint = field.hint ? `<span class="hint">${escapeHTML(field.hint)}</span>` : '';

      let control = '';

      if(field.type === 'textarea'){
        control = `<textarea id="${field.id}" data-field="${field.id}">${escapeHTML(data[field.id] || '')}</textarea>`;
      }else if(field.type === 'select'){
        control = `
          <select id="${field.id}" data-field="${field.id}">
            <option value="">בחר אפשרות...</option>
            ${field.options.map(option => `
              <option value="${escapeHTML(option)}" ${data[field.id] === option ? 'selected' : ''}>
                ${escapeHTML(option)}
              </option>
            `).join('')}
          </select>
        `;
      }else if(field.type === 'images'){
        const count = images[field.id]?.length || 0;
        control = `
          <label class="image-box" for="${field.id}">
            📷 לחץ להעלאת תמונות ${count ? `(${count} תמונות נבחרו)` : ''}
          </label>
          <input class="image-input" id="${field.id}" type="file" accept="image/*" multiple data-image-field="${field.id}">
          <div class="image-preview" id="preview-${field.id}">
            ${(images[field.id] || []).map(src => `<img src="${src}" alt="">`).join('')}
          </div>
        `;
      }else{
        control = `<input id="${field.id}" data-field="${field.id}" type="${field.type}" value="${escapeHTML(data[field.id] || '')}">`;
      }

      return `
        <div class="field${fullClass}" data-wrap="${field.id}" ${hiddenStyle}>
          <label for="${field.id}">${required}${escapeHTML(field.label)}</label>
          ${control}
          ${hint}
        </div>
      `;
    }

    function bindInputs(){
      document.querySelectorAll('[data-field]').forEach(input => {
        input.addEventListener('input', () => {
          data[input.dataset.field] = input.value;
          saveDraft();
          updateConditionalFields();
        });

        input.addEventListener('change', () => {
          data[input.dataset.field] = input.value;
          saveDraft();
          updateConditionalFields();
        });
      });

      document.querySelectorAll('[data-image-field]').forEach(input => {
        input.addEventListener('change', async () => {
          const key = input.dataset.imageField;
          if(!images[key]) images[key] = [];

          for(const file of Array.from(input.files || [])){
            const dataUrl = await resizeImage(file);
            if(dataUrl) images[key].push(dataUrl);
          }

          saveDraft();
          renderForm();
        });
      });
    }

    function updateConditionalFields(){
      allFields().forEach(field => {
        const wrap = document.querySelector(`[data-wrap="${field.id}"]`);
        if(!wrap) return;

        wrap.style.display = isVisibleField(field) ? '' : 'none';

        if(!isVisibleField(field)){
          delete data[field.id];
        }
      });
    }

    function resizeImage(file, maxSize=1280, quality=.72){
      return new Promise(resolve => {
        const reader = new FileReader();

        reader.onload = event => {
          const img = new Image();

          img.onload = () => {
            let width = img.width;
            let height = img.height;
            const scale = Math.min(1, maxSize / Math.max(width, height));

            width = Math.round(width * scale);
            height = Math.round(height * scale);

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;

            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };

          img.onerror = () => resolve(event.target.result);
          img.src = event.target.result;
        };

        reader.onerror = () => resolve('');
        reader.readAsDataURL(file);
      });
    }

    function validateRequired(){
      const missing = [];

      FORM_CONFIG.sections.forEach(section => {
        section.fields.forEach(field => {
          if(!field.required || !isVisibleField(field)) return;

          if(field.type === 'images'){
            if(!images[field.id] || images[field.id].length === 0){
              missing.push(`${section.title} – ${field.label}`);
            }
            return;
          }

          if(!data[field.id] || !String(data[field.id]).trim()){
            missing.push(`${section.title} – ${field.label}`);
          }
        });
      });

      return missing;
    }

    function showValidationError(missing){
      const box = $('#error-box');

      box.innerHTML = `
        <strong>לא ניתן להפיק דוח – חסרים שדות חובה:</strong>
        <ul style="padding-right:18px;margin:0;">
          ${missing.map(item => `<li>${escapeHTML(item)}</li>`).join('')}
        </ul>
      `;

      box.classList.add('show');
      box.scrollIntoView({behavior:'smooth', block:'start'});
    }

    function createReport(){
      const missing = validateRequired();

      if(missing.length){
        showValidationError(missing);
        return;
      }

      $('#error-box').classList.remove('show');
      const report = $('#report');
      report.innerHTML = buildReport();
      report.classList.add('show');
      saveDraft();
      report.scrollIntoView({behavior:'smooth', block:'start'});
    }

    function reportField(field){
      if(!isVisibleField(field)) return '';

      const value = displayValue(field);
      if(field.type === 'images') return '';

      return `
        <div class="report-field ${field.full ? 'full' : ''}">
          <label>${escapeHTML(field.label)}</label>
          <div class="report-value">${escapeHTML(value)}</div>
        </div>
      `;
    }

    function reportImages(field){
      if(field.type !== 'images' || !isVisibleField(field)) return '';
      const list = images[field.id] || [];

      if(!list.length) return '';

      return `
        <div class="report-section-title">${escapeHTML(field.label)}</div>
        <div class="report-images">
          ${list.map(src => `<img src="${src}" alt="">`).join('')}
        </div>
      `;
    }

    function buildReport(){
      const logo = FORM_CONFIG.logoPath;

      return `
        <div class="report-inner" id="pdf-report">
          <div class="report-header">
            <img class="report-logo" src="${logo}" alt="Edge Control" onerror="this.style.display='none'">
            <div class="company">
              Imber 24, Petah Tikva, Israel<br>
              Tel: 073-3318500<br>
              office@edgecontrol.net<br>
              www.EdgeControl.co.il
            </div>
          </div>

          <h2>${escapeHTML(FORM_CONFIG.title)}</h2>

          ${FORM_CONFIG.sections.map(section => `
            <div class="report-section-title">${escapeHTML(section.title)}</div>
            <div class="report-grid">
              ${section.fields.map(reportField).join('')}
            </div>
            ${section.fields.map(reportImages).join('')}
          `).join('')}

          <div class="report-section-title">חתימות ואישורים</div>
          <div class="signature-row">
            <div class="signature-box">
              <strong>חתימת טכנאי / חשמלאי</strong>
              ${signatures.tech ? `<img src="${signatures.tech}" alt="חתימת טכנאי">` : '<div class="report-value">—</div>'}
            </div>
            <div class="signature-box">
              <strong>חתימת לקוח / נציג</strong>
              ${signatures.client ? `<img src="${signatures.client}" alt="חתימת לקוח">` : '<div class="report-value">—</div>'}
            </div>
          </div>
        </div>
      `;
    }

    function openSignature(type){
      currentSignature = type;
      $('#sig-title').textContent = type === 'tech' ? 'חתימת טכנאי / חשמלאי' : 'חתימת לקוח / נציג';
      $('#signature-modal').classList.add('show');
      clearSignature();
      initSignatureCanvas();
    }

    function closeSignature(){
      $('#signature-modal').classList.remove('show');
      currentSignature = null;
    }

    function clearSignature(){
      const canvas = $('#signature-canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function saveSignature(){
      if(!currentSignature) return;

      signatures[currentSignature] = $('#signature-canvas').toDataURL('image/png');
      saveDraft();
      closeSignature();

      if($('#report').classList.contains('show')){
        $('#report').innerHTML = buildReport();
      }

      alert('החתימה נשמרה בהצלחה.');
    }

    function initSignatureCanvas(){
      const canvas = $('#signature-canvas');
      const ctx = canvas.getContext('2d');
      let drawing = false;

      ctx.lineWidth = 2.6;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#111';

      function pos(e){
        const rect = canvas.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        return {
          x:(p.clientX - rect.left) * (canvas.width / rect.width),
          y:(p.clientY - rect.top) * (canvas.height / rect.height)
        };
      }

      function start(e){
        e.preventDefault();
        drawing = true;
        const p = pos(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      }

      function move(e){
        if(!drawing) return;
        e.preventDefault();
        const p = pos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }

      function end(e){
        if(e) e.preventDefault();
        drawing = false;
      }

      canvas.onmousedown = start;
      canvas.onmousemove = move;
      canvas.onmouseup = end;
      canvas.onmouseleave = end;
      canvas.ontouchstart = start;
      canvas.ontouchmove = move;
      canvas.ontouchend = end;
    }

    function fileBase(){
      const parts = FORM_CONFIG.fileFields
        .map(id => data[id])
        .filter(Boolean)
        .map(value => String(value).trim().replace(/[\\/:*?"<>|]/g,'-'));

      return `${FORM_CONFIG.title}${parts.length ? ' - ' + parts.join(' - ') : ''}`;
    }

    function printReport(){
      if(!$('#report').classList.contains('show')){
        createReport();
      }

      if(!$('#report').classList.contains('show')) return;

      const win = window.open('', '_blank');

      if(!win){
        alert('הדפדפן חסם את חלון ההדפסה. יש לאפשר Popups.');
        return;
      }

      win.document.open();
      win.document.write(`
        <!DOCTYPE html>
        <html dir="rtl" lang="he">
        <head>
          <meta charset="UTF-8">
          <title>${escapeHTML(fileBase())}</title>
          <style>${document.querySelector('style').innerHTML}</style>
        </head>
        <body>
          <section class="report show">${buildReport()}</section>
          <script>
            setTimeout(function(){ window.focus(); window.print(); }, 600);
          <\/script>
        </body>
        </html>
      `);
      win.document.close();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadDraft();
      renderForm();

      $('#make-report').addEventListener('click', createReport);
      $('#sig-tech').addEventListener('click', () => openSignature('tech'));
      $('#sig-client').addEventListener('click', () => openSignature('client'));
      $('#print-pdf').addEventListener('click', printReport);
      $('#clear-draft').addEventListener('click', clearDraft);

      window.addEventListener('beforeunload', saveDraft);
      window.addEventListener('pagehide', saveDraft);
      document.addEventListener('visibilitychange', () => {
        if(document.visibilityState === 'hidden') saveDraft();
      });
    });
  </script>
</body>
</html>
